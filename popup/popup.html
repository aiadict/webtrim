<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebTrim</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">✂</span>
      <span class="logo-text">WebTrim</span>
    </div>
    <div class="domain" id="domain"></div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-pick">
      <span class="btn-pick-main" id="pick-label">Pick an element to hide</span>
      <span class="btn-pick-sub" id="pick-sub">then click it on the page</span>
    </button>
    <button class="btn btn-secondary" id="btn-pause" style="display:none">Show Hidden</button>
  </div>

  <div class="add-text-rule">
    <input type="text" id="text-input" placeholder='e.g. AI Overview, Sponsored, Promoted' />
    <button class="btn btn-add" id="btn-add-text">Add Rule</button>
  </div>
  <div class="suggestions" id="suggestions"></div>

  <div class="rules-section">
    <div class="rules-header">
      <span class="rules-title">Rules on this site</span>
      <div class="rules-meta">
        <span class="hidden-count" id="hidden-count" style="display:none"></span>
        <span class="rules-count" id="rules-count" style="display:none">0</span>
      </div>
    </div>
    <div class="rules-list" id="rules-list"></div>
  </div>
  <div class="undo-toast" id="undo-toast">
    <span class="undo-msg">Rule deleted</span>
    <button id="undo-btn">Undo</button>
  </div>
  <div class="save-toast" id="save-toast">
    <span>✓ Saved permanently</span>
  </div>
  <div class="error-toast" id="error-toast">
    <span>Could not save — storage may be full</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
